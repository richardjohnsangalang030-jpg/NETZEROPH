<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Solar Calculator | NetZero PH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #1b4332;
            --brand-secondary: #2d6a4f;
            --brand-accent: #52b788;
            --ui-bg: #f8fafc;
            --ui-card-bg: #ffffff;
            --ui-border: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ui-bg); color: var(--text-dark); line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        
        header { background: var(--ui-card-bg); border-bottom: 1px solid var(--ui-border); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; }
        .brand-text h1 { font-size: 1.1rem; font-weight: 800; color: var(--brand-primary); }
        .brand-text p { font-size: 0.75rem; color: var(--text-muted); }
        
        .main-content { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; }
        
        .dashboard-card { background: var(--ui-card-bg); border: 1px solid var(--ui-border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--ui-border); background: #fdfdfd; }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; }
        
        .method-selector { display: flex; gap: 8px; padding: 1rem 1.5rem; background: #f1f5f9; }
        .method-btn { flex: 1; padding: 0.75rem; border: 2px solid var(--ui-border); border-radius: 10px; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .method-btn.active { border-color: var(--brand-primary); background: var(--brand-primary); color: white; }

        .table-area { padding: 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 1rem; font-size: 0.7rem; color: var(--text-muted); border-bottom: 1px solid var(--ui-border); text-transform: uppercase; text-align: left; }
        td { padding: 1rem; border-bottom: 1px solid var(--ui-border); font-size: 0.9rem; }
        
        input, select { padding: 0.75rem; border: 1px solid var(--ui-border); border-radius: 8px; background: #fff; font-family: inherit; font-size: 1rem; width: 100%; appearance: none; }
        
        .btn { padding: 0.75rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; text-align: center; font-size: 0.9rem; }
        .btn-primary { background: var(--brand-primary); color: white; }
        .btn-outline { border-color: var(--ui-border); background: white; font-size: 0.8rem; padding: 0.5rem 0.75rem; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; }
        
        .results-container { display: grid; grid-template-columns: 1fr; }
        .result-block { padding: 1.5rem; }
        .usage-block { background: #f1f5f9; color: var(--text-dark); }
        .financial-block { background: var(--brand-primary); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-group label { font-size: 0.65rem; opacity: 0.8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .stat-group span { font-size: 1.2rem; font-weight: 800; display: block; }
        .highlight-text { color: var(--brand-accent); }

        .client-info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 1.5rem; }
        .hidden { display: none !important; }

        @media (min-width: 768px) {
            .brand-text h1 { font-size: 1.5rem; }
            .results-container { grid-template-columns: 1fr 1fr; }
            .client-info-grid { grid-template-columns: 1fr 1fr; }
            .main-content { margin: 2rem auto; }
            .stat-group span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="brand"><div class="brand-text"><h1>NetZero PH</h1><p>Solar Engineering</p></div></div>
        <div class="nav-tabs" style="display: flex; gap: 5px;">
            <button class="btn btn-outline" id="navAdminBtn">Admin</button>
            <button class="btn btn-danger hidden" id="logoutBtn">Logout</button>
        </div>
    </div>
</header>

<main class="main-content">
    
    <div id="calculatorView">
        <div class="dashboard-card">
            <div class="card-header"><h2>1. Energy Estimation</h2></div>
            <div class="method-selector">
                <button id="btnOptA" class="method-btn active" onclick="switchMethod('A')">Monthly Bill</button>
                <button id="btnOptB" class="method-btn" onclick="switchMethod('B')">Appliance Audit</button>
            </div>
            
            <!-- Option A: Bill -->
            <div id="sectionBill" class="result-block">
                <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; display: block;">Enter Average Monthly Bill (₱)</label>
                <input type="number" id="billInput" placeholder="e.g. 5000" oninput="calculateByBill()" style="max-width: 100%;">
            </div>

            <!-- Option B: Audit -->
            <div id="sectionAppliances" class="table-area hidden">
                <div style="padding: 1rem; background: #fff; border-bottom: 1px solid var(--ui-border); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.75rem; font-weight: 800; color: var(--brand-secondary);">APPLIANCE LIST</span>
                    <button class="btn btn-primary" onclick="addRow()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">+ Add Item</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Appliance</th>
                            <th style="width: 80px;">Watts</th>
                            <th style="width: 60px;">Qty</th>
                            <th style="width: 60px;">Hrs</th>
                            <th style="width: 80px;">kWh</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="applianceBody"></tbody>
                </table>
            </div>

            <div class="results-container">
                <div id="resBlockB" class="result-block usage-block hidden">
                    <div class="stat-grid">
                        <div class="stat-group"><label>Daily Load</label><span id="resDailyB">0.00 kWh</span></div>
                        <div class="stat-group"><label>Monthly Total</label><span id="resMonthlyB">0.00 kWh</span></div>
                    </div>
                </div>
                <div class="result-block financial-block">
                    <div class="stat-grid">
                        <div class="stat-group"><label>Est. Monthly Bill</label><span id="resCostA">₱0.00</span></div>
                        <div class="stat-group"><label>Solar System Size</label><span id="resInverterA" class="highlight-text">---</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="card-header"><h2>2. Get Your Proposal</h2></div>
            <div class="client-info-grid">
                <input type="text" id="clientName" placeholder="Full Name">
                <input type="tel" id="clientContact" placeholder="Contact Number (e.g. 0917...)">
                <input type="email" id="clientEmail" placeholder="Email Address">
                <input type="text" id="clientAddress" placeholder="Location (City/Province)">
            </div>
            <div style="padding: 0 1.5rem 1.5rem;">
                <button id="submitBtn" class="btn btn-success" style="width: 100%; padding: 1rem; font-size: 1rem; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);">
                    Submit for Free Consultation
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Views ... (Keep as original) -->
    <div id="loginView" class="hidden">
        <div style="max-width: 400px; margin: 40px auto; padding: 2rem; background: white; border-radius: 16px; border: 1px solid var(--ui-border);">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Admin Access</h2>
            <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom: 1rem;">
            <input type="password" id="loginPass" placeholder="Password" style="margin-bottom: 1.5rem;">
            <button class="btn btn-primary" id="doLoginBtn" style="width: 100%;">Login</button>
            <button class="btn btn-outline" onclick="showView('calculator')" style="width: 100%; margin-top: 10px; border:none;">Back to Calculator</button>
        </div>
    </div>

    <div id="adminView" class="hidden">
        <div class="dashboard-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Inquiries</h2>
                <button class="btn btn-success" id="exportCsvBtn" style="padding: 0.5rem 0.75rem; font-size: 0.75rem;">Export CSV</button>
            </div>
            <div class="table-area">
                <table>
                    <thead><tr><th>Date</th><th>Client</th><th>Contact</th><th>System</th><th>Action</th></tr></thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOOF8o3Xsw2tPsjNd9OtKkNEqkjzu-6K4",
        authDomain: "solar-24b06.firebaseapp.com",
        projectId: "solar-24b06",
        databaseURL: "https://solar-24b06-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // PINALAWAK NA APPLIANCE LIBRARY
    const applianceLibrary = [
        // Lighting & Entertainment
        { name: "LED Bulb (9W)", w: 9 },
        { name: "LED Bulb (15W)", w: 15 },
        { name: "Smart TV (43-55 inch)", w: 100 },
        { name: "Large OLED TV (65 inch+)", w: 200 },
        { name: "Soundbar / Home Theater", w: 150 },
        { name: "Gaming Console (PS5/Xbox)", w: 200 },
        
        // Cooling
        { name: "Electric Fan (Stand/Desk)", w: 65 },
        { name: "Ceiling Fan", w: 80 },
        { name: "Aircon 1.0HP (Non-Inverter)", w: 1000 },
        { name: "Aircon 1.0HP (Inverter)", w: 400 },
        { name: "Aircon 1.5HP (Non-Inverter)", w: 1400 },
        { name: "Aircon 1.5HP (Inverter)", w: 600 },
        { name: "Aircon 2.0HP (Inverter)", w: 900 },
        
        // Kitchen
        { name: "Refrigerator (Small/Single)", w: 120 },
        { name: "Inverter Fridge (2-Door)", w: 150 },
        { name: "Chest Freezer", w: 250 },
        { name: "Rice Cooker (Small)", w: 400 },
        { name: "Rice Cooker (Large)", w: 800 },
        { name: "Microwave Oven", w: 1200 },
        { name: "Induction Cooker (1 Burner)", w: 2000 },
        { name: "Electric Kettle", w: 1500 },
        { name: "Coffee Maker", w: 800 },
        { name: "Air Fryer", w: 1500 },
        { name: "Blender", w: 400 },
        
        // Laundry & Cleaning
        { name: "Washing Machine (Twin Tub)", w: 400 },
        { name: "Washing Machine (Front Load)", w: 2000 },
        { name: "Spin Dryer", w: 300 },
        { name: "Electric Iron", w: 1000 },
        { name: "Vacuum Cleaner", w: 1200 },
        
        // Office & Others
        { name: "Laptop / MacBook", w: 60 },
        { name: "Desktop PC (Office)", w: 200 },
        { name: "Gaming PC (High End)", w: 500 },
        { name: "CCTV System (4-8 cams)", w: 50 },
        { name: "Water Dispenser (Hot & Cold)", w: 550 },
        { name: "Water Pump (0.5 HP)", w: 375 },
        { name: "Water Pump (1.0 HP)", w: 750 }
    ].sort((a, b) => a.name.localeCompare(a.name));

    let KWH_RATE = 11.50; 
    let currentDaily = 0, currentCost = 0;

    window.showView = (v) => {
        ['calculatorView', 'loginView', 'adminView'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(v + 'View').classList.remove('hidden');
    };

    window.switchMethod = (m) => {
        document.getElementById('btnOptA').classList.toggle('active', m === 'A');
        document.getElementById('btnOptB').classList.toggle('active', m === 'B');
        document.getElementById('sectionBill').classList.toggle('hidden', m !== 'A');
        document.getElementById('sectionAppliances').classList.toggle('hidden', m !== 'B');
        document.getElementById('resBlockB').classList.toggle('hidden', m !== 'B');
        if(m === 'A') calculateByBill(); else updateTable();
    };

    window.addRow = () => {
        const tr = document.createElement('tr');
        let options = applianceLibrary.map(a => `<option value="${a.w}">${a.name}</option>`).join('');
        tr.innerHTML = `
            <td>
                <select onchange="syncWatts(this)" style="font-size:0.8rem;">
                    <option value="0">Select...</option>
                    ${options}
                    <option value="custom">Custom (Input Watts)</option>
                </select>
            </td>
            <td><input type="number" class="w" placeholder="W" oninput="updateTable()" style="font-size:0.8rem;"></td>
            <td><input type="number" class="q" value="1" oninput="updateTable()" style="font-size:0.8rem;"></td>
            <td><input type="number" class="h" value="1" oninput="updateTable()" style="font-size:0.8rem;"></td>
            <td class="row-kwh" style="font-weight:bold; color:var(--brand-secondary); font-size:0.8rem;">0.0</td>
            <td><button class="btn-danger" onclick="this.parentElement.parentElement.remove();updateTable();">×</button></td>
        `;
        document.getElementById('applianceBody').appendChild(tr);
    };

    window.syncWatts = (el) => {
        const val = el.value;
        const wInput = el.parentElement.parentElement.querySelector('.w');
        if(val !== "custom") {
            wInput.value = val;
            wInput.readOnly = true;
            wInput.style.background = "#f1f5f9";
        } else {
            wInput.value = "";
            wInput.readOnly = false;
            wInput.style.background = "#fff";
            wInput.focus();
        }
        updateTable();
    };

    window.updateTable = () => {
        let daily = 0;
        document.querySelectorAll('#applianceBody tr').forEach(row => {
            const w = parseFloat(row.querySelector('.w').value) || 0;
            const q = parseFloat(row.querySelector('.q').value) || 0;
            const h = parseFloat(row.querySelector('.h').value) || 0;
            const rKwh = (w * q * h) / 1000;
            row.querySelector('.row-kwh').innerText = rKwh.toFixed(2);
            daily += rKwh;
        });
        currentDaily = daily;
        currentCost = daily * 30 * KWH_RATE;
        refreshUI();
    };

    window.calculateByBill = () => {
        currentCost = parseFloat(document.getElementById('billInput').value) || 0;
        currentDaily = (currentCost / KWH_RATE) / 30;
        refreshUI();
    };

    function refreshUI() {
        document.getElementById('resCostA').innerText = '₱' + currentCost.toLocaleString(undefined, {maximumFractionDigits: 0});
        document.getElementById('resInverterA').innerText = getSystemSize(currentDaily);
        document.getElementById('resDailyB').innerText = currentDaily.toFixed(2) + ' kWh';
        document.getElementById('resMonthlyB').innerText = (currentDaily * 30).toFixed(0) + ' kWh';
    }

    function getSystemSize(daily) {
        if (daily <= 0) return "---";
        const size = daily / 3.5; 
        if (size <= 1.5) return "1.5kW System";
        if (size <= 3) return "3kW System";
        if (size <= 5) return "5kW System";
        if (size <= 10) return "10kW System";
        return "Commercial / Customized";
    }

    // Submit Logic
    document.getElementById('submitBtn').onclick = () => {
        const name = document.getElementById('clientName').value;
        const contact = document.getElementById('clientContact').value;
        if(!name || !contact) return alert("Please enter name and contact number");
        
        const d = new Date();
        push(ref(db, 'inquiries'), {
            timestamp: d.getTime(),
            dateDisplay: d.toLocaleDateString(),
            name, contact,
            email: document.getElementById('clientEmail').value,
            address: document.getElementById('clientAddress').value,
            bill: currentCost.toFixed(2), 
            rec: getSystemSize(currentDaily)
        }).then(() => { 
            alert("Success! We will contact you soon."); 
            location.reload(); 
        });
    };

    // Auto-start
    addRow();
</script>
</body>
</html>
