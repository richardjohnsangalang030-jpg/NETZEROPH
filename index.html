  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Solar Calculator | NetZero PH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #1b4332;
            --brand-secondary: #2d6a4f;
            --brand-accent: #52b788;
            --ui-bg: #f8fafc;
            --ui-card-bg: #ffffff;
            --ui-border: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ui-bg); color: var(--text-dark); line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        
        header { background: var(--ui-card-bg); border-bottom: 1px solid var(--ui-border); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; }
        .brand-text h1 { font-size: 1.1rem; font-weight: 800; color: var(--brand-primary); }
        .brand-text p { font-size: 0.75rem; color: var(--text-muted); }
        
        .main-content { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; }
        
        .dashboard-card { background: var(--ui-card-bg); border: 1px solid var(--ui-border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--ui-border); background: #fdfdfd; }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; }
        
        .method-selector { display: flex; gap: 8px; padding: 1rem 1.5rem; background: #f1f5f9; }
        .method-btn { flex: 1; padding: 0.75rem; border: 2px solid var(--ui-border); border-radius: 10px; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .method-btn.active { border-color: var(--brand-primary); background: var(--brand-primary); color: white; }

        .table-area { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 600px; }
        th { background: #f8fafc; padding: 1rem; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--ui-border); text-transform: uppercase; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--ui-border); font-size: 0.9rem; vertical-align: middle; }
        
        input, select { padding: 0.85rem; border: 1px solid var(--ui-border); border-radius: 8px; background: #fff; font-family: inherit; font-size: 0.95rem; width: 100%; appearance: none; }
        .w, .q, .h { min-width: 70px; }

        .btn { padding: 0.75rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; text-align: center; font-size: 0.9rem; }
        .btn-primary { background: var(--brand-primary); color: white; }
        .btn-outline { border-color: var(--ui-border); background: white; font-size: 0.8rem; padding: 0.5rem 0.75rem; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; border-radius: 6px; padding: 10px 14px; font-size: 0.9rem; }
        
        .results-container { display: grid; grid-template-columns: 1fr; }
        .result-block { padding: 1.5rem; }
        .usage-block { background: #f1f5f9; color: var(--text-dark); }
        .financial-block { background: var(--brand-primary); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-group label { font-size: 0.65rem; opacity: 0.8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .stat-group span { font-size: 1.2rem; font-weight: 800; display: block; }
        .highlight-text { color: var(--brand-accent); }

        .client-info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 1.5rem; }
        .hidden { display: none !important; }

        .price-settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 1.5rem; background: #f8fafc; border-radius: 12px; margin: 1rem; border: 1px solid var(--ui-border); }
        .price-input-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 5px; }

        @media (min-width: 768px) {
            .results-container { grid-template-columns: 1fr 1fr; }
            .client-info-grid { grid-template-columns: 1fr 1fr; }
            .stat-group span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="brand"><div class="brand-text"><h1>NetZero PH</h1><p>Solar Engineering</p></div></div>
        <div class="nav-tabs" style="display: flex; gap: 5px;">
            <button class="btn btn-outline" id="navAdminBtn">Admin</button>
            <button class="btn btn-danger hidden" id="logoutBtn">Logout</button>
        </div>
    </div>
</header>

<main class="main-content">
    
    <!-- CALCULATOR VIEW -->
    <div id="calculatorView">
        <div class="dashboard-card">
            <div class="card-header"><h2>1. Energy Estimation</h2></div>
            <div class="method-selector">
                <button id="btnOptA" class="method-btn active" onclick="switchMethod('A')">Monthly Bill</button>
                <button id="btnOptB" class="method-btn" onclick="switchMethod('B')">Appliance Audit</button>
            </div>
            
            <div id="sectionBill" class="result-block">
                <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; display: block;">Enter Average Monthly Bill (₱)</label>
                <input type="number" id="billInput" placeholder="e.g. 5000" oninput="calculateByBill()">
            </div>

            <div id="sectionAppliances" class="table-area hidden">
                <div style="padding: 1rem; background: #fff; border-bottom: 1px solid var(--ui-border); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.75rem; font-weight: 800; color: var(--brand-secondary);">APPLIANCE LIST</span>
                    <button class="btn btn-primary" onclick="addRow()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">+ Add Item</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Appliance</th>
                            <th style="width: 100px;">Watts</th>
                            <th style="width: 80px;">Qty</th>
                            <th style="width: 80px;">Hrs</th>
                            <th style="width: 90px;">kWh</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="applianceBody"></tbody>
                </table>
            </div>

            <div class="results-container">
                <div id="resBlockB" class="result-block usage-block hidden">
                    <div class="stat-grid">
                        <div class="stat-group"><label>Daily Load</label><span id="resDailyB">0.00 kWh</span></div>
                        <div class="stat-group"><label>Monthly Total</label><span id="resMonthlyB">0.00 kWh</span></div>
                    </div>
                </div>
                <div class="result-block financial-block">
                    <div class="stat-grid">
                        <div class="stat-group"><label>Recommended System</label><span id="resInverterA" class="highlight-text">---</span></div>
                        <div class="stat-group"><label>Est. Package Price</label><span id="resSystemPrice" class="highlight-text">₱0.00</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="card-header"><h2>2. Get Your Proposal</h2></div>
            <div class="client-info-grid">
                <input type="text" id="clientName" placeholder="Full Name">
                <input type="tel" id="clientContact" placeholder="Contact Number">
                <input type="email" id="clientEmail" placeholder="Email Address">
                <input type="text" id="clientAddress" placeholder="Location (City/Province)">
            </div>
            <div style="padding: 0 1.5rem 1.5rem;">
                <button id="submitBtn" class="btn btn-success" style="width: 100%; padding: 1rem; font-size: 1rem;">
                    Submit for Free Consultation
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView" class="hidden">
        <div style="max-width: 400px; margin: 40px auto; padding: 2rem; background: white; border-radius: 16px; border: 1px solid var(--ui-border);">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Admin Access</h2>
            <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom: 1rem;">
            <input type="password" id="loginPass" placeholder="Password" style="margin-bottom: 1.5rem;">
            <button class="btn btn-primary" id="doLoginBtn" style="width: 100%;">Login</button>
            <button class="btn btn-outline" id="backToCalc" style="width: 100%; margin-top: 10px; border:none;">Back to Calculator</button>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="adminView" class="hidden">
        <!-- Pricing Settings Section -->
        <div class="dashboard-card">
            <div class="card-header"><h2>System Pricing & Settings</h2></div>
            <div style="padding: 1.5rem 1.5rem 0;">
                <label style="font-weight: 700; font-size: 0.85rem;">Global Electricity Rate (₱/kWh):</label>
                <input type="number" id="adminKwhRate" step="0.01" style="width: 150px; margin-top: 5px;">
            </div>
            
            <div class="price-settings-grid" id="priceInputsContainer">
                <!-- Dynamically Generated Inputs -->
            </div>
            
            <div style="padding: 0 1.5rem 1.5rem;">
                <button class="btn btn-primary" id="saveAdminSettings" style="width: 200px;">Save All Changes</button>
            </div>
        </div>

        <!-- Inquiries Table -->
        <div class="dashboard-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Client Inquiries</h2>
                <button class="btn btn-outline" onclick="showView('calculator')">Exit Admin</button>
            </div>
            <div class="table-area">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Client</th>
                            <th>Contact</th>
                            <th>Location</th>
                            <th>Recommended</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOOF8o3Xsw2tPsjNd9OtKkNEqkjzu-6K4",
        authDomain: "solar-24b06.firebaseapp.com",
        projectId: "solar-24b06",
        databaseURL: "https://solar-24b06-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Default Configuration
    let sysConfig = {
        rate: 12.00,
        prices: {
            "3kW": 165000,
            "5kW": 275000,
            "8kW": 395000,
            "10kW": 485000,
            "16kW": 720000,
            "20kW": 890000
        }
    };

    let currentDaily = 0;

    // 1. Sync Settings from Firebase
    onValue(ref(db, 'settings'), (snapshot) => {
        if(snapshot.exists()){
            const data = snapshot.val();
            if(data.kwhRate) sysConfig.rate = parseFloat(data.kwhRate);
            if(data.prices) sysConfig.prices = data.prices;
        }
        renderPriceInputs();
        refreshUI();
    });

    // 2. Render Admin Price Inputs
    function renderPriceInputs() {
        const container = document.getElementById('priceInputsContainer');
        const rateInput = document.getElementById('adminKwhRate');
        
        rateInput.value = sysConfig.rate;
        container.innerHTML = "";
        
        Object.keys(sysConfig.prices).forEach(key => {
            const div = document.createElement('div');
            div.className = "price-input-group";
            div.innerHTML = `
                <label>${key} Package (₱)</label>
                <input type="number" class="sys-price-input" data-key="${key}" value="${sysConfig.prices[key]}">
            `;
            container.appendChild(div);
        });
    }

    // 3. Save Admin Settings
    document.getElementById('saveAdminSettings').onclick = () => {
        const newRate = parseFloat(document.getElementById('adminKwhRate').value);
        const newPrices = {};
        document.querySelectorAll('.sys-price-input').forEach(input => {
            newPrices[input.dataset.key] = parseFloat(input.value) || 0;
        });

        update(ref(db, 'settings'), {
            kwhRate: newRate,
            prices: newPrices
        }).then(() => alert("Settings Updated Successfully!"));
    };

    // --- Calculator Logic ---
    window.switchMethod = (m) => {
        document.getElementById('btnOptA').classList.toggle('active', m === 'A');
        document.getElementById('btnOptB').classList.toggle('active', m === 'B');
        document.getElementById('sectionBill').classList.toggle('hidden', m !== 'A');
        document.getElementById('sectionAppliances').classList.toggle('hidden', m !== 'B');
        document.getElementById('resBlockB').classList.toggle('hidden', m !== 'B');
        m === 'A' ? calculateByBill() : updateTable();
    };

    window.calculateByBill = () => {
        const bill = parseFloat(document.getElementById('billInput').value) || 0;
        currentDaily = (bill / sysConfig.rate) / 30;
        refreshUI();
    };

    window.updateTable = () => {
        let daily = 0;
        document.querySelectorAll('#applianceBody tr').forEach(row => {
            const w = parseFloat(row.querySelector('.w').value) || 0;
            const q = parseFloat(row.querySelector('.q').value) || 0;
            const h = parseFloat(row.querySelector('.h').value) || 0;
            const rKwh = (w * q * h) / 1000;
            row.querySelector('.row-kwh').innerText = rKwh.toFixed(2);
            daily += rKwh;
        });
        currentDaily = daily;
        refreshUI();
    };

    function refreshUI() {
        const result = getSystemRecommendation(currentDaily);
        document.getElementById('resInverterA').innerText = result.size;
        document.getElementById('resSystemPrice').innerText = '₱' + result.price.toLocaleString();
        document.getElementById('resDailyB').innerText = currentDaily.toFixed(2) + ' kWh';
        document.getElementById('resMonthlyB').innerText = (currentDaily * 30).toFixed(0) + ' kWh';
    }

    function getSystemRecommendation(daily) {
        if (daily <= 0) return { size: "---", price: 0 };
        const kwNeeded = daily / 3.5; 
        let size = "Commercial";
        if (kwNeeded <= 3.5) size = "3kW";
        else if (kwNeeded <= 5.5) size = "5kW";
        else if (kwNeeded <= 8.5) size = "8kW";
        else if (kwNeeded <= 11) size = "10kW";
        else if (kwNeeded <= 17) size = "16kW";
        else if (kwNeeded <= 22) size = "20kW";

        return {
            size: size === "Commercial" ? "Commercial Scale" : size + " System",
            price: sysConfig.prices[size] || 0
        };
    }

    // --- Admin & Firebase Management ---
    window.showView = (v) => {
        ['calculatorView', 'loginView', 'adminView'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(v + 'View').classList.remove('hidden');
    };

    document.getElementById('navAdminBtn').onclick = () => auth.currentUser ? showView('admin') : showView('login');
    document.getElementById('backToCalc').onclick = () => showView('calculator');

    document.getElementById('doLoginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
            .then(() => showView('admin'))
            .catch(err => alert("Login Failed: " + err.message));
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadInquiries();
        }
    });

    function loadInquiries() {
        onValue(ref(db, 'inquiries'), (snapshot) => {
            const body = document.getElementById('adminTableBody');
            body.innerHTML = "";
            snapshot.forEach(child => {
                const data = child.val();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.dateDisplay}</td>
                    <td>${data.name}</td>
                    <td>${data.contact}</td>
                    <td>${data.address || 'N/A'}</td>
                    <td>${data.rec}</td>
                    <td><button class="btn-danger" onclick="deleteInquiry('${child.key}')">Del</button></td>
                `;
                body.appendChild(tr);
            });
        });
    }

    window.deleteInquiry = (key) => { if(confirm('Delete this inquiry?')) remove(ref(db, 'inquiries/' + key)); };

    document.getElementById('submitBtn').onclick = () => {
        const name = document.getElementById('clientName').value;
        const contact = document.getElementById('clientContact').value;
        if(!name || !contact) return alert("Please fill in Name and Contact Number.");
        
        const rec = getSystemRecommendation(currentDaily);
        push(ref(db, 'inquiries'), {
            timestamp: Date.now(),
            dateDisplay: new Date().toLocaleDateString(),
            name, contact,
            email: document.getElementById('clientEmail').value,
            address: document.getElementById('clientAddress').value,
            rec: rec.size,
            price: rec.price
        }).then(() => {
            alert("Thank you! Your request for a free consultation has been sent.");
            location.reload();
        });
    };

    // Boilerplate for Appliance addRow (Same as original)
    window.addRow = () => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" placeholder="e.g. Fridge"></td>
            <td><input type="number" class="w" placeholder="W" oninput="updateTable()"></td>
            <td><input type="number" class="q" value="1" oninput="updateTable()"></td>
            <td><input type="number" class="h" value="1" oninput="updateTable()"></td>
            <td class="row-kwh">0.0</td>
            <td><button class="btn-danger" onclick="this.parentElement.parentElement.remove();updateTable();">×</button></td>
        `;
        document.getElementById('applianceBody').appendChild(tr);
    };
    addRow();
</script>
</body>
</html>
