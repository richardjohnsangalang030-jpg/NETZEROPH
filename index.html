<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Solar Calculator | NZ BUILD AND ENERGY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #1b4332;
            --brand-secondary: #2d6a4f;
            --brand-accent: #52b788;
            --ui-bg: #f8fafc;
            --ui-card-bg: #ffffff;
            --ui-border: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--ui-bg); 
            color: var(--text-dark); 
            line-height: 1.5; 
            -webkit-tap-highlight-color: transparent; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        header { background: var(--ui-card-bg); border-bottom: 1px solid var(--ui-border); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; width: 100%; height: 70px; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; }
        .brand-text h1 { font-size: 1.1rem; font-weight: 800; color: var(--brand-primary); }
        .brand-text p { font-size: 0.75rem; color: var(--text-muted); }
        
        .admin-wrapper { display: flex; flex: 1; position: relative; }
        
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--brand-primary); 
            color: white; 
            padding: 1.5rem 1rem; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem; 
            height: calc(100vh - 70px); 
            position: sticky; 
            top: 70px; 
            z-index: 999;
            transition: transform 0.3s ease;
        }

        .sidebar-link { padding: 0.85rem 1rem; border-radius: 8px; color: #cbd5e1; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 0.9rem; text-decoration: none; border: none; background: transparent; text-align: left; width: 100%; }
        .sidebar-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .sidebar-link.active { background: var(--brand-accent); color: var(--brand-primary); font-weight: 700; }
        
        .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 0.5rem; }
        .btn-sidebar-logout { color: #fca5a5; }

        .main-content { flex: 1; max-width: 1200px; margin: 1rem auto; padding: 0 1rem; width: 100%; }
        
        .dashboard-card { background: var(--ui-card-bg); border: 1px solid var(--ui-border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--ui-border); background: #fdfdfd; display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; }
        
        .method-selector { display: flex; gap: 8px; padding: 1rem 1.5rem; background: #f1f5f9; }
        .method-btn { flex: 1; padding: 0.75rem; border: 2px solid var(--ui-border); border-radius: 10px; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .method-btn.active { border-color: var(--brand-primary); background: var(--brand-primary); color: white; }

        .table-area { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 600px; }
        th { background: #f8fafc; padding: 1rem; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--ui-border); text-transform: uppercase; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--ui-border); font-size: 0.9rem; vertical-align: middle; }
        
        input, select { padding: 0.85rem; border: 1px solid var(--ui-border); border-radius: 8px; background: #fff; font-family: inherit; font-size: 16px; width: 100%; }

        .btn { padding: 0.75rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; text-align: center; font-size: 0.9rem; }
        .btn-primary { background: var(--brand-primary); color: white; }
        .btn-outline { border-color: var(--ui-border); background: white; font-size: 0.8rem; padding: 0.5rem 0.75rem; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; border-radius: 6px; padding: 8px 12px; font-size: 0.85rem; border:none; }
        
        /* Calendar Styles */
        .calendar-container { padding: 1.5rem; background: #fff; border-bottom: 1px solid var(--ui-border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .calendar-day-head { text-align: center; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); padding-bottom: 5px; }
        .calendar-day { 
            aspect-ratio: 1/1; border: 1px solid var(--ui-border); border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 0.8rem; cursor: pointer; transition: 0.2s; position: relative;
        }
        .calendar-day:hover { background: #f1f5f9; }
        .calendar-day.has-inquiry { border-color: var(--brand-accent); background: #f0fdf4; }
        .calendar-day.active-filter { background: var(--brand-primary) !important; color: white; }
        .inquiry-count { 
            position: absolute; bottom: 2px; right: 2px; background: var(--brand-accent); 
            color: var(--brand-primary); font-size: 0.6rem; font-weight: 800; 
            padding: 1px 4px; border-radius: 4px; 
        }
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        .results-container { display: grid; grid-template-columns: 1fr; }
        .result-block { padding: 1.5rem; }
        .usage-block { background: #f1f5f9; color: var(--text-dark); }
        .financial-block { background: var(--brand-primary); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-group label { font-size: 0.65rem; opacity: 0.8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .stat-group span { font-size: 1.2rem; font-weight: 800; display: block; }
        .highlight-text { color: var(--brand-accent); }

        .client-info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 1.5rem; }
        .hidden { display: none !important; }

        .price-settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 1.5rem; background: #f8fafc; border-radius: 12px; margin: 1rem; border: 1px solid var(--ui-border); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .admin-wrapper { flex-direction: column; }
            .results-container { grid-template-columns: 1fr; }
        }
        
        @media (min-width: 768px) {
            .results-container { grid-template-columns: 1fr 1fr; }
            .client-info-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="brand">
            <div class="brand-text">
                <h1>NZ BUILD AND ENERGY</h1>
                <p>ABUCANY BATAAN | 09771638925</p>
            </div>
        </div>
        <div class="nav-tabs" style="display: flex; gap: 5px;">
            <button class="btn btn-outline" id="menuToggle" style="display: none;">Menu</button>
            <button class="btn btn-outline" id="navAdminBtn">Admin Panel</button>
        </div>
    </div>
</header>

<div id="ui-wrapper" class="admin-wrapper">
    
    <nav id="adminSidebar" class="sidebar hidden">
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <button class="sidebar-link active" onclick="switchAdminTab('inquiries', this)">Client Inquiries</button>
            <button class="sidebar-link" onclick="switchAdminTab('pricing', this)">Pricing Settings</button>
        </div>
        
        <div class="sidebar-footer">
            <button class="sidebar-link" onclick="exitAdmin()">← Back to Calculator</button>
            <button class="sidebar-link btn-sidebar-logout" id="logoutBtnSidebar">Logout</button>
        </div>
    </nav>

    <main class="main-content" id="mainArea">
        
        <div id="calculatorView">
            <div class="dashboard-card">
                <div class="card-header"><h2>1. Energy Estimation</h2></div>
                <div class="method-selector">
                    <button id="btnOptA" class="method-btn active" onclick="switchMethod('A')">Monthly Bill</button>
                    <button id="btnOptB" class="method-btn" onclick="switchMethod('B')">Appliance Audit</button>
                </div>
                
                <div id="sectionBill" class="result-block">
                    <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; display: block;">Enter Average Monthly Bill (₱)</label>
                    <input type="number" id="billInput" placeholder="e.g. 5000" oninput="calculateByBill()">
                </div>

                <div id="sectionAppliances" class="table-area hidden">
                    <div style="padding: 1rem; background: #fff; border-bottom: 1px solid var(--ui-border); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.75rem; font-weight: 800; color: var(--brand-secondary);">APPLIANCE LIST</span>
                        <button class="btn btn-primary" onclick="addRow()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">+ Add Item</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Select Appliance</th>
                                <th style="width: 100px;">Watts</th>
                                <th style="width: 80px;">Qty</th>
                                <th style="width: 80px;">Hrs/Day</th>
                                <th style="width: 90px;">kWh</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="applianceBody"></tbody>
                    </table>
                </div>

                <div class="results-container">
                    <div id="resBlockB" class="result-block usage-block hidden">
                        <div class="stat-grid">
                            <div class="stat-group"><label>Daily Load</label><span id="resDailyB">0.00 kWh</span></div>
                            <div class="stat-group"><label>Monthly Total</label><span id="resMonthlyB">0.00 kWh</span></div>
                        </div>
                    </div>
                    <div class="result-block financial-block">
                        <div class="stat-grid">
                            <div class="stat-group"><label>Recommended System</label><span id="resInverterA" class="highlight-text">---</span></div>
                            <div class="stat-group"><label>Est. Package Price</label><span id="resSystemPrice" class="highlight-text">₱0.00</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header"><h2>2. Get Your Proposal</h2></div>
                <div class="client-info-grid">
                    <input type="text" id="clientName" placeholder="Full Name">
                    <input type="tel" id="clientContact" placeholder="09771638925 (Contact Number)" maxlength="11">
                    <input type="email" id="clientEmail" placeholder="Email Address">
                    <input type="text" id="clientAddress" placeholder="Location (City/Province)">
                </div>
                <div style="padding: 0 1.5rem 1.5rem;">
                    <button id="submitBtn" class="btn btn-success" style="width: 100%; padding: 1rem; font-size: 1rem;">
                        Submit for Free Consultation
                    </button>
                </div>
            </div>
        </div>

        <div id="loginView" class="hidden">
            <div style="max-width: 400px; margin: 40px auto; padding: 2rem; background: white; border-radius: 16px; border: 1px solid var(--ui-border);">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Admin Access</h2>
                <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom: 1rem;">
                <input type="password" id="loginPass" placeholder="Password" style="margin-bottom: 1.5rem;">
                <button class="btn btn-primary" id="doLoginBtn" style="width: 100%;">Login</button>
                <button class="btn btn-outline" id="backToCalc" style="width: 100%; margin-top: 10px; border:none;">Back to Calculator</button>
            </div>
        </div>

        <div id="adminView" class="hidden">
            <div id="adminSectionInquiries">
                <div class="dashboard-card">
                    <div class="card-header">
                        <h2>Client Inquiries</h2>
                        <button class="btn btn-outline" id="toggleCalendarBtn">Show Calendar</button>
                    </div>
                    
                    <div id="calendarWrapper" class="calendar-container hidden">
                        <div class="calendar-controls">
                            <button class="btn btn-outline" onclick="changeMonth(-1)">❮</button>
                            <h3 id="calendarMonthYear" style="font-size: 0.9rem;">Month Year</h3>
                            <button class="btn btn-outline" onclick="changeMonth(1)">❯</button>
                        </div>
                        <div class="calendar-grid" id="calendarGrid">
                            <!-- JS populated -->
                        </div>
                        <div style="margin-top: 10px; text-align: center;">
                            <button class="btn btn-outline" onclick="clearDateFilter()" style="font-size: 0.7rem;">Clear Filter / Show All</button>
                        </div>
                    </div>

                    <div class="table-area">
                        <table>
                            <thead>
                                <tr><th>Date</th><th>Client</th><th>Contact</th><th>Location</th><th>Rec</th><th>Action</th></tr>
                            </thead>
                            <tbody id="adminTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="adminSectionPricing" class="hidden">
                <div class="dashboard-card">
                    <div class="card-header"><h2>System Pricing & Settings</h2></div>
                    <div style="padding: 1.5rem;">
                        <label style="font-weight: 700; font-size: 0.85rem;">Global Electricity Rate (₱/kWh):</label>
                        <input type="number" id="adminKwhRate" step="0.01" style="width: 150px;">
                    </div>
                    <div class="price-settings-grid" id="priceInputsContainer"></div>
                    <div style="padding: 1.5rem;"><button class="btn btn-primary" id="saveAdminSettings">Save All Changes</button></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCOOF8o3Xsw2tPsjNd9OtKkNEqkjzu-6K4",
        authDomain: "solar-24b06.firebaseapp.com",
        projectId: "solar-24b06",
        databaseURL: "https://solar-24b06-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const APPLIANCE_LIBRARY = {
        "Custom": 0,
        "-- COOLING --": 0,
        "Aircon (1.0 HP)": 900, "Aircon (1.5 HP)": 1300, "Aircon (2.0 HP)": 1800,
        "Electric Fan (Stand)": 60, "Electric Fan (Ceiling)": 75, "Air Cooler": 120,
        "-- KITCHEN --": 0,
        "Refrigerator (Small)": 150, "Refrigerator (Inverter Large)": 200, "Freezer (Chest)": 300,
        "Microwave Oven": 1200, "Electric Kettle": 1500, "Rice Cooker (Small)": 400, "Rice Cooker (Large)": 800,
        "Induction Cooker": 2000, "Air Fryer": 1400, "Coffee Maker": 800, "Blender": 350, "Water Dispenser": 500,
        "-- ENTERTAINMENT --": 0,
        "LED TV (32\")": 50, "LED TV (43-55\")": 120, "LED TV (65\"+)": 200,
        "Sound System / Speakers": 150, "Gaming Console (PS5/Xbox)": 200,
        "-- LAUNDRY & CLEANING --": 0,
        "Washing Machine": 400, "Spin Dryer": 300, "Fully Auto Washer": 600,
        "Electric Iron": 1100, "Vacuum Cleaner": 1200,
        "-- OFFICE & LIGHTING --": 0,
        "Laptop / PC": 150, "Desktop PC (Gaming)": 450, "CCTV System": 50, "Wi-Fi Router": 15,
        "LED Bulb (9W)": 9, "LED Tube (18W)": 18,
        "-- WATER --": 0,
        "Water Pump (0.5 HP)": 375, "Water Heater (Shower)": 3500
    };

    let sysConfig = { rate: 12.00, prices: { "3kW": 165000, "5kW": 275000, "8kW": 395000, "10kW": 485000, "16kW": 720000, "20kW": 890000 } };
    let currentDaily = 0;
    let allInquiries = [];
    let calendarDate = new Date();
    let selectedDateFilter = null;

    onValue(ref(db, 'settings'), (snapshot) => {
        if(snapshot.exists()){
            const data = snapshot.val();
            if(data.kwhRate) sysConfig.rate = parseFloat(data.kwhRate);
            if(data.prices) sysConfig.prices = data.prices;
        }
        renderPriceInputs();
        refreshUI();
    });

    function renderPriceInputs() {
        const container = document.getElementById('priceInputsContainer');
        const rateInput = document.getElementById('adminKwhRate');
        if(rateInput) rateInput.value = sysConfig.rate;
        container.innerHTML = "";
        Object.keys(sysConfig.prices).forEach(key => {
            const div = document.createElement('div');
            div.innerHTML = `<label style="font-size:0.7rem; font-weight:700;">${key} (₱)</label><input type="number" class="sys-price-input" data-key="${key}" value="${sysConfig.prices[key]}">`;
            container.appendChild(div);
        });
    }

    document.getElementById('saveAdminSettings').onclick = () => {
        const newPrices = {};
        document.querySelectorAll('.sys-price-input').forEach(i => newPrices[i.dataset.key] = parseFloat(i.value));
        update(ref(db, 'settings'), { kwhRate: parseFloat(document.getElementById('adminKwhRate').value), prices: newPrices }).then(() => alert("Saved!"));
    };

    window.switchMethod = (m) => {
        document.getElementById('btnOptA').classList.toggle('active', m === 'A');
        document.getElementById('btnOptB').classList.toggle('active', m === 'B');
        document.getElementById('sectionBill').classList.toggle('hidden', m !== 'A');
        document.getElementById('sectionAppliances').classList.toggle('hidden', m !== 'B');
        document.getElementById('resBlockB').classList.toggle('hidden', m !== 'B');
        m === 'A' ? calculateByBill() : updateTable();
    };

    window.calculateByBill = () => {
        currentDaily = (parseFloat(document.getElementById('billInput').value) || 0) / sysConfig.rate / 30;
        refreshUI();
    };

    window.updateTable = () => {
        let daily = 0;
        document.querySelectorAll('#applianceBody tr').forEach(row => {
            const w = parseFloat(row.querySelector('.w').value) || 0;
            const q = parseFloat(row.querySelector('.q').value) || 0;
            const h = parseFloat(row.querySelector('.h').value) || 0;
            const res = (w * q * h) / 1000;
            row.querySelector('.row-kwh').innerText = res.toFixed(2);
            daily += res;
        });
        currentDaily = daily;
        refreshUI();
    };

    function refreshUI() {
        const res = getSystemRecommendation(currentDaily);
        document.getElementById('resInverterA').innerText = res.size;
        document.getElementById('resSystemPrice').innerText = '₱' + res.price.toLocaleString();
        if(document.getElementById('resDailyB')) document.getElementById('resDailyB').innerText = currentDaily.toFixed(2) + ' kWh';
        if(document.getElementById('resMonthlyB')) document.getElementById('resMonthlyB').innerText = (currentDaily * 30).toFixed(0) + ' kWh';
    }

    function getSystemRecommendation(daily) {
        if (daily <= 0) return { size: "---", price: 0 };
        const kw = daily / 3.5;
        let s = "Commercial";
        if (kw <= 3.5) s = "3kW";
        else if (kw <= 5.5) s = "5kW";
        else if (kw <= 8.5) s = "8kW";
        else if (kw <= 11) s = "10kW";
        else if (kw <= 17) s = "16kW";
        else if (kw <= 22) s = "20kW";
        return { size: s === "Commercial" ? "Commercial Scale" : s + " System", price: sysConfig.prices[s] || 0 };
    }

    window.showView = (v) => {
        ['calculatorView', 'loginView', 'adminView', 'adminSidebar'].forEach(id => document.getElementById(id).classList.add('hidden'));
        if (v === 'admin') {
            document.getElementById('adminView').classList.remove('hidden');
            document.getElementById('adminSidebar').classList.remove('hidden');
            if(window.innerWidth <= 768) document.getElementById('menuToggle').style.display = 'block';
        } else {
            document.getElementById(v + 'View').classList.remove('hidden');
            document.getElementById('menuToggle').style.display = 'none';
        }
    };

    window.exitAdmin = () => {
        document.getElementById('adminSidebar').classList.remove('mobile-open');
        showView('calculator');
    }

    document.getElementById('menuToggle').onclick = () => document.getElementById('adminSidebar').classList.toggle('mobile-open');

    window.switchAdminTab = (tab, btn) => {
        document.getElementById('adminSectionInquiries').classList.toggle('hidden', tab !== 'inquiries');
        document.getElementById('adminSectionPricing').classList.toggle('hidden', tab !== 'pricing');
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('adminSidebar').classList.remove('mobile-open');
    };

    document.getElementById('navAdminBtn').onclick = () => auth.currentUser ? showView('admin') : showView('login');
    document.getElementById('backToCalc').onclick = () => showView('calculator');

    document.getElementById('doLoginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
            .then(() => showView('admin'))
            .catch(err => alert("Error: " + err.message));
    };

    document.getElementById('logoutBtnSidebar').onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => { if (user) loadInquiries(); });

    function loadInquiries() {
        onValue(ref(db, 'inquiries'), (snapshot) => {
            allInquiries = [];
            snapshot.forEach(child => {
                allInquiries.push({ id: child.key, ...child.val() });
            });
            renderInquiryTable();
            renderCalendar();
        });
    }

    function renderInquiryTable() {
        const body = document.getElementById('adminTableBody');
        if(!body) return;
        body.innerHTML = "";
        
        let filtered = allInquiries;
        if(selectedDateFilter) {
            filtered = allInquiries.filter(i => i.dateDisplay === selectedDateFilter);
        }

        filtered.sort((a, b) => b.timestamp - a.timestamp);

        filtered.forEach(data => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${data.dateDisplay || 'N/A'}</td>
                <td>${data.name}</td>
                <td>${data.contact}</td>
                <td>${data.address || 'N/A'}</td>
                <td>${data.rec}</td>
                <td><button class="btn-danger" onclick="deleteInquiry('${data.id}')">Del</button></td>
            `;
            body.appendChild(tr);
        });
    }

    document.getElementById('toggleCalendarBtn').onclick = function() {
        const wrap = document.getElementById('calendarWrapper');
        wrap.classList.toggle('hidden');
        this.innerText = wrap.classList.contains('hidden') ? 'Show Calendar' : 'Hide Calendar';
    };

    window.changeMonth = (dir) => {
        calendarDate.setMonth(calendarDate.getMonth() + dir);
        renderCalendar();
    };

    window.clearDateFilter = () => {
        selectedDateFilter = null;
        renderCalendar();
        renderInquiryTable();
    };

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthYearLabel = document.getElementById('calendarMonthYear');
        grid.innerHTML = "";

        const year = calendarDate.getFullYear();
        const month = calendarDate.getMonth();
        monthYearLabel.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(calendarDate);

        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        days.forEach(d => grid.innerHTML += `<div class="calendar-day-head">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const counts = {};
        allInquiries.forEach(i => {
            counts[i.dateDisplay] = (counts[i.dateDisplay] || 0) + 1;
        });

        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = new Date(year, month, d).toLocaleDateString();
            const count = counts[dateStr] || 0;
            const isActive = selectedDateFilter === dateStr ? 'active-filter' : '';
            const hasInq = count > 0 ? 'has-inquiry' : '';
            
            const dayEl = document.createElement('div');
            dayEl.className = `calendar-day ${hasInq} ${isActive}`;
            dayEl.innerHTML = `<span>${d}</span>${count > 0 ? `<span class="inquiry-count">${count}</span>` : ''}`;
            dayEl.onclick = () => {
                selectedDateFilter = dateStr;
                renderCalendar();
                renderInquiryTable();
            };
            grid.appendChild(dayEl);
        }
    }

    window.deleteInquiry = (k) => { if(confirm('Delete?')) remove(ref(db, 'inquiries/' + k)); };

    document.getElementById('submitBtn').onclick = () => {
        const name = document.getElementById('clientName').value;
        const contact = document.getElementById('clientContact').value;
        if(!name || !contact) return alert("Missing info");
        if(contact.length !== 11 || isNaN(contact)) return alert("Please enter a valid 11-digit contact number.");

        const rec = getSystemRecommendation(currentDaily);
        push(ref(db, 'inquiries'), {
            timestamp: Date.now(), 
            dateDisplay: new Date().toLocaleDateString(),
            name, contact, email: document.getElementById('clientEmail').value,
            address: document.getElementById('clientAddress').value,
            rec: rec.size, price: rec.price
        }).then(() => { alert("Sent!"); location.reload(); });
    };

    window.addRow = () => {
        const tr = document.createElement('tr');
        let options = Object.keys(APPLIANCE_LIBRARY).map(k => {
            const isDisabled = k.startsWith('--') ? 'disabled' : '';
            const style = k.startsWith('--') ? 'style="background:#f1f5f9; font-weight:bold; color:var(--brand-primary)"' : '';
            return `<option value="${APPLIANCE_LIBRARY[k]}" ${isDisabled} ${style}>${k}</option>`;
        }).join('');
        
        tr.innerHTML = `
            <td><select class="lib-select" onchange="this.parentElement.nextElementSibling.children[0].value=this.value; updateTable();">${options}</select></td>
            <td><input type="number" class="w" value="0" oninput="updateTable()"></td>
            <td><input type="number" class="q" value="1" oninput="updateTable()"></td>
            <td><input type="number" class="h" value="1" oninput="updateTable()"></td>
            <td class="row-kwh">0.0</td>
            <td><button class="btn-danger" onclick="this.parentElement.parentElement.remove();updateTable();">×</button></td>
        `;
        document.getElementById('applianceBody').appendChild(tr);
    };
    addRow();
</script>
</body>
</html>
